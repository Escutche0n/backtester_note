name: BacktesterNote

options:
  bundleIdPrefix: com.chenyuefu
  deploymentTarget:
    iOS: "17.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

configs:
  Debug: debug
  Release: release

packages:
  BacktesterNoteAlgorithms:
    path: .

targets:
  BacktesterNote:
    type: application
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chenyuefu.backtester-note
        PRODUCT_NAME: BacktesterNote
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: App/Entitlements/BacktesterNote.entitlements
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: BacktesterNoteAlgorithms
        product: BacktesterNoteAlgorithms
      - target: BacktesterNoteWidgets

  BacktesterNoteWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - path: Widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chenyuefu.backtester-note.widgets
        PRODUCT_NAME: BacktesterNoteWidgets
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: App/Entitlements/BacktesterNoteWidgets.entitlements
        INFOPLIST_FILE: Widgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

schemes:
  BacktesterNote:
    build:
      targets:
        BacktesterNote: all
        BacktesterNoteWidgets: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
  BacktesterNoteWidgets:
    build:
      targets:
        BacktesterNoteWidgets: all
    run:
      config: Debug
    archive:
      config: Release
